#!KAMAILIO

log_stderror=no
fork=yes
children=4
debug=3
log_stderror=yes
log_color=1
log_prefix="[$Tf] - "
log_facility=LOG_LOCAL0

loadmodule "tm.so"
loadmodule "sl.so"
loadmodule "json.so"
loadmodule "ndb_redis.so"
loadmodule "app_python3.so"
loadmodule "dispatcher.so"
loadmodule "usrloc.so"
loadmodule "xlog.so"
loadmodule "textops.so"
loadmodule "registrar.so"
loadmodule "ctl.so"
loadmodule "pv.so"
loadmodule "rr.so"
loadmodule "dialog.so"
loadmodule "peerstate.so"

import_file "/etc/kamailio/aliases.cfg"

# Redis
modparam("ndb_redis", "server", "name=reg_redis;addr=redis;port=6379;db=0")

# Python
modparam("app_python3", "mod_init_function", "mod_init")
modparam("app_python3", "load", "/etc/kamailio/update_states.py")

# Dispatcher (load balance para os 2 Asterisks)
modparam("dispatcher", "list_file", "/etc/kamailio/dispatcher.list")
modparam("dispatcher", "ds_ping_interval", 5)
modparam("dispatcher", "ds_probing_threshold", 2)

# Usrloc (memória - para teste)
modparam("usrloc", "db_mode", 0)

modparam("ctl", "binrpc", "unix:/var/run/kamailio/kamailio_ctl")
modparam("ctl", "mode", 0666)

modparam("dialog", "enable_stats", 1)
modparam("peerstate", "use_avps", 1)
modparam("peerstate", "caller_avp", "$avp(caller_peer)")
modparam("peerstate", "callee_avp", "$avp(callee_peer)")
modparam("peerstate", "reg_avp",   "$avp(reg_peer)")
modparam("peerstate", "disable_dlg_notify", 0)



# ====================== ROUTING ======================
request_route {
    if (is_method("REGISTER")) {
        $avp(reg_peer) = $fU;
        if (save("location")) {
            xlog("update_registration");            
            python_exec("update_registration");            
        }
        exit;
    }

    if (is_method("OPTIONS")) {
        if (uri==myself) {
            sl_send_reply("200", "Keepalive");
            exit;
        }        
    }
    # Load balance das chamadas para Asterisk
    if (is_method("INVITE|BYE|ACK|CANCEL|UPDATE")) {

        if (registered("location","$fu")) {            
            $avp(caller_peer) = $fU;
        } else {
            $avp(caller_peer) = 'dummy';
        }
        
        if (registered("location","$ru")) {            
            $avp(callee_peer) = $rU;
        } else {
            $avp(callee_peer) = 'dummy';
        }
        
        dlg_manage();
        ds_select_dst("1", "0");
        t_relay();
        exit;
    }
}

event_route[usrloc:contact-expired] {
    xlog("update_registration");    
    python_exec("update_registration");     
}

event_route[peerstate:state_changed] {
    xlog("Peer $avp(ps_peer): $avp(ps_prev_state) -> $avp(ps_state)");     
    python_exec("update_peerstate");      
}